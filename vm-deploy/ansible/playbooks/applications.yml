---
- name: Install applications and configure Windows hosts
  hosts: all
  gather_facts: false
  vars:
    sql_admin_username: "{{ lookup('env', 'SQL_ADMIN_USERNAME') | default('sqladmin', true) }}"
    sql_admin_password: "{{ lookup('env', 'SQL_ADMIN_PASSWORD') | default('', true) }}"
  tasks:
    - name: Ensure Chocolatey is installed
      chocolatey.chocolatey.win_chocolatey:
        name: chocolatey
        state: present

    - name: Ensure NuGet provider and PowerShellGet are installed
      ansible.windows.win_powershell:
        script: |
          $changed = $false

          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider NuGet -Force
            $changed = $true
          }

          if (-not (Get-Module -ListAvailable -Name PowerShellGet)) {
            Install-Module PowerShellGet -Force -AllowClobber
            $changed = $true
          }

          $Ansible.Changed = $changed

    - name: Reboot before SQL Server install
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 30

    - name: Install SQL Server 2022 Developer (mixed mode SQL auth)
      chocolatey.chocolatey.win_chocolatey:
        name: sql-server-2022
        state: present
        timeout: 5400
        package_params: >-
          /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
          /SQLSVCACCOUNT="NT AUTHORITY\SYSTEM"
          /AGTSVCACCOUNT="NT AUTHORITY\SYSTEM"
          /SECURITYMODE=SQL
          /SAPWD="{{ sql_admin_password }}"
      register: sql_install_result
      failed_when: false
      become: true
      become_method: runas
      become_user: "{{ ansible_user }}"
      vars:
        ansible_become_password: "{{ ansible_password }}"

    - name: Show formatted SQL install error details
      ansible.builtin.debug:
        msg: |
          SQL Server install failed.

          RC: {{ sql_install_result.rc | default('n/a') }}

          Command:
          {{ sql_install_result.command | default('n/a') }}

          Stdout:
          {{ (sql_install_result.stdout_lines | default([])) | join('\n') }}

          Stderr:
          {{ (sql_install_result.stderr_lines | default([])) | join('\n') }}
      when: sql_install_result.failed | default(false)

    - name: Stop play when SQL install fails
      ansible.builtin.fail:
        msg: "SQL Server installation failed. See formatted output above."
      when: sql_install_result.failed | default(false)

    - name: Install SQL Server Management Studio
      chocolatey.chocolatey.win_chocolatey:
        name: sql-server-management-studio
        state: present
        timeout: 2700

    - name: Install Notepad++
      chocolatey.chocolatey.win_chocolatey:
        name: notepadplusplus
        state: present

    - name: Create SQL admin login for SQL Authentication mode
      ansible.windows.win_shell: |
        $sqlAdmin = "{{ sql_admin_username }}"
        $saPassword = "{{ sql_admin_password }}"
        $safeSqlAdmin = $sqlAdmin.Replace("]", "]]" )
        $safeSqlAdminLiteral = $sqlAdmin.Replace("'", "''")
        $safeSaPassword = $saPassword.Replace("'", "''")

        $query = "IF NOT EXISTS (SELECT 1 FROM sys.sql_logins WHERE name = N'$safeSqlAdminLiteral') BEGIN CREATE LOGIN [$safeSqlAdmin] WITH PASSWORD = '$safeSaPassword', CHECK_POLICY = ON; END; ALTER SERVER ROLE [sysadmin] ADD MEMBER [$safeSqlAdmin];"

        sqlcmd -S "localhost" -U "sa" -P "{{ sql_admin_password }}" -Q $query

    - name: Show final provisioning summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          Provisioning summary
          Host: {{ inventory_hostname }}
          SQL Server 2022: installed
          SQL Server Management Studio: installed
          Notepad++: installed
          NuGet provider: installed
          PowerShellGet: installed
          SQL admin login: {{ sql_admin_username }}
          Status: SUCCESS
          ============================================================
